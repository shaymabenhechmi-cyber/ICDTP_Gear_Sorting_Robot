# STM32 Serial Bridge Calibration
# Maps ROS2 joint names to STM32 motor indices and conversion factors.
#
# steps_per_rad = (STEPS_PER_REV * MICROSTEPS * GEAR_RATIO) / (2 * pi)
# offset_steps  = Steps to add so that URDF 0.0 rad maps to correct STM32 position.
#                 Must be calibrated after first Reset/Homing on real hardware.

stm32_serial_node:
  ros__parameters:
    serial_port: /dev/ttyACM0
    baud_rate: 115200
    report_interval_ms: 5

    joints:
      joint_basis_arm1:
        motor_index: 0
        steps_per_rad: -2546.0 #-10185.9  # negative: neg. angle → pos. steps
        offset_steps: 0

      joint_arm1_arm2:
        motor_index: 1
        steps_per_rad: -1909.9 #-7639.4   # negative: neg. angle → pos. steps
        offset_steps: 0

      joint_arm2_arm3:
        motor_index: 2
        steps_per_rad: -1909.9 #-7639.4   # negative: neg. angle → pos. steps
        offset_steps: 0

      joint_arm3_greifer:
        motor_index: 3
        steps_per_rad: -477.5 #-1909.9   # negative: neg. angle → pos. steps
        offset_steps: 0

    gripper:
      motor_index: 4
      steps_open: 0              # Motor 5 position after goHome()
      steps_closed: 20000   # TODO: measure on real hardware
      finger_mapping:
        joint_greifer_finger1:
          open: 0.0              # rad
          closed: 0.4            # rad (URDF limit: 0.0..0.4)
        joint_greifer_finger2:
          open: 0.0              # rad
          closed: 0.4            # rad (URDF limit: 0.0..0.4)
        joint_greifer_finger3:
          open: 0.0              # rad
          closed: 0.4            # rad (URDF limit: 0.0..0.4)
